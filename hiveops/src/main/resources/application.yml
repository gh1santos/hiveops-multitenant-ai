spring:
  application:
    name: hiveops

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/hiveops_db # <-- MUDAN�A AQUI (5433)
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-placeholder}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:SUA_CHAVE_SECRETA_MUITO_LONGA_DE_PELO_MENOS_256_BITS_PARA_O_HS256_AQUI}
      expiration: 86400000 # 24 horas

server:
  port: 8080


  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      disable-swagger-default-url: true