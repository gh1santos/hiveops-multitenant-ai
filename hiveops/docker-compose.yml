version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16 # Imagem específica que suporta a extensão vector!
    container_name: hiveops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hiveops_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: